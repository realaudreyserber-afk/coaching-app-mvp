name: Firebase deploy (functions + rules + indexes)

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'storage.rules'
      - 'firebase.json'
  workflow_dispatch:

concurrency:
  group: firebase-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install functions deps
        working-directory: functions
        run: npm install --no-audit --no-fund

      - name: Build functions
        working-directory: functions
        run: npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      - name: Authenticate to Google Cloud (Service Account)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy Firestore rules + indexes + Storage rules
        run: firebase deploy --only firestore:rules,firestore:indexes,storage:rules --project linsociable-coaching --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}

      - name: Deploy Cloud Functions
        run: firebase deploy --only functions --project linsociable-coaching --non-interactive --force
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}

      - name: Notify deploy success
        if: success()
        run: echo "✅ Firebase deploy complete for commit ${{ github.sha }}"
